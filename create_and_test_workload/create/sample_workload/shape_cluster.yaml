##This comprehensive benchmark covers:
#Size clusters: tiny, small, medium, large, huge matrices
#Shape clusters: square, tall-skinny, short-wide, low-rank, reduction-heavy, rectangular
#Edge cases: very small ops, non-tile-aligned dimensions, extreme aspect ratios
#Special cases: GEMV-like, outer products, batched operations
#Variations: different fidelities, output dtypes, buffer locations
#Real workloads: transformer shapes, conv-like shapes, original ViT examples
workload:
  name: /proj_sw/user_dev/pkorhale/tt-metal/generated/profiler/reports/shape_clusters/shape_cluster_benchmark.csv
  total_ops: 60
  description: "Comprehensive shape clusters for performance modeling"
  note: Covers square, tall-skinny, short-wide, low-rank, reduction-heavy, and various sizes
